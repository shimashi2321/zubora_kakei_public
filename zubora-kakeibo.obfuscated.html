<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ずぼら家計簿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAF6EF;
    --card:#FFFFFF;
    --ink:#3B3833;
    --ink-soft:#928C7E;
    --sage:#8FAA92;
    --sage-deep:#5E7E66;
    --sage-bg:#E7EFE6;
    --coral:#E8A18A;
    --coral-deep:#C97455;
    --coral-bg:#FBEAE3;
    --line:#ECE3D2;
    --shadow:0 6px 20px rgba(80,65,35,0.08);
    --radius:22px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Zen Kaku Gothic New','Hiragino Sans',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    padding-bottom:90px;
    position:relative;
  }
  header.top{
    padding:28px 20px 14px;
    text-align:center;
  }
  header.top h1{
    font-family:'Zen Maru Gothic',sans-serif;
    font-weight:900;
    font-size:26px;
    margin:0;
    letter-spacing:0.02em;
    color:var(--sage-deep);
  }
  header.top p{
    margin:4px 0 0;
    font-size:12.5px;
    color:var(--ink-soft);
  }
  main{ padding:0 16px; }
  .card{
    background:var(--card);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:20px;
    margin-bottom:16px;
  }
  .card h2{
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:15px;
    margin:0 0 12px;
    color:var(--ink);
    display:flex;
    align-items:center;
    gap:6px;
  }
  /* ---- balance hero (signature element) ---- */
  .balance-hero{
    border-radius:28px;
    padding:26px 22px 22px;
    background:linear-gradient(155deg,#FFFFFF 0%, #FFFFFF 55%, var(--sage-bg) 130%);
    box-shadow:var(--shadow);
    margin-bottom:16px;
    position:relative;
    overflow:hidden;
  }
  .balance-hero .label{
    font-size:13px;
    color:var(--ink-soft);
    margin-bottom:2px;
  }
  .balance-hero .amount{
    font-family:'Zen Maru Gothic',sans-serif;
    font-weight:900;
    font-size:42px;
    line-height:1.1;
    letter-spacing:-0.01em;
  }
  .balance-hero .amount span{ font-size:20px; margin-right:2px;}
  .gauge-track{
    margin-top:16px;
    height:14px;
    border-radius:99px;
    background:var(--line);
    overflow:hidden;
  }
  .gauge-fill{
    height:100%;
    border-radius:99px;
    transition:width .5s ease;
  }
  .mood{
    margin-top:10px;
    font-size:12.5px;
    color:var(--ink-soft);
  }
  .breakdown-toggle{ display:none; }
  .breakdown{
    margin-top:14px;
    padding-top:12px;
    border-top:1px solid var(--line);
    font-size:12.5px;
    color:var(--ink-soft);
    line-height:1.9;
  }
  .breakdown .row{display:flex;justify-content:space-between;}
  .breakdown .row b{color:var(--ink); font-weight:500;}
  .savings-pill{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:var(--sage-bg);
    color:var(--sage-deep);
    border-radius:99px;
    padding:8px 14px;
    font-size:13px;
    font-weight:500;
    margin-bottom:16px;
  }
  /* ---- quick add ---- */
  .quickadd{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .quickadd .row2{ display:flex; gap:8px; }
  input, select{
    font-family:inherit;
    font-size:15px;
    padding:11px 13px;
    border-radius:14px;
    border:1px solid var(--line);
    background:#FFFDFA;
    color:var(--ink);
    width:100%;
  }
  input:focus, select:focus{ outline:2px solid var(--sage); border-color:transparent; }
  input[type=number]{ font-family:'Zen Maru Gothic',sans-serif; }
  button{
    font-family:'Zen Maru Gothic',sans-serif;
    border:none;
    cursor:pointer;
  }
  .btn{
    border-radius:14px;
    padding:12px 16px;
    font-size:14.5px;
    font-weight:700;
    background:var(--sage);
    color:#fff;
    transition:transform .1s ease, opacity .15s;
  }
  .btn:active{ transform:scale(0.97); }
  .btn.coral{ background:var(--coral); }
  .btn.ghost{
    background:transparent;
    border:1.5px solid var(--line);
    color:var(--ink-soft);
  }
  .btn.block{ width:100%; }
  .btn.small{ padding:8px 12px; font-size:13px; }
  .btn[disabled]{ opacity:0.4; cursor:default; }
  .expense-list{ margin-top:14px; display:flex; flex-direction:column; gap:8px; }
  .expense-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 4px;
    border-bottom:1px solid var(--line);
    font-size:13.5px;
  }
  .expense-item:last-child{ border-bottom:none; }
  .expense-item .memo{ color:var(--ink-soft); font-size:12px; }
  .expense-item .amt{ font-family:'Zen Maru Gothic',sans-serif; font-weight:700; }
  .expense-item .del{
    background:none; color:var(--ink-soft); font-size:11px; padding:4px 8px; border-radius:8px;
  }
  .empty{
    text-align:center;
    color:var(--ink-soft);
    font-size:13px;
    padding:24px 10px;
  }
  /* ---- tabs ---- */
  nav.tabs{
    position:fixed;
    bottom:0; left:0; right:0;
    max-width:480px;
    margin:0 auto;
    background:#FFFDFA;
    border-top:1px solid var(--line);
    display:flex;
    padding:8px 10px calc(8px + env(safe-area-inset-bottom));
    z-index:50;
  }
  nav.tabs button{
    flex:1;
    background:none;
    color:var(--ink-soft);
    font-size:11.5px;
    padding:8px 0 4px;
    border-radius:14px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:3px;
  }
  nav.tabs button .ic{ font-size:19px; }
  nav.tabs button.active{ color:var(--sage-deep); background:var(--sage-bg); }
  .tabpane{ display:none; }
  .tabpane.active{ display:block; }
  /* ---- settings list rows ---- */
  .list-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 2px;
    border-bottom:1px solid var(--line);
    font-size:14px;
  }
  .list-row:last-child{ border-bottom:none; }
  .list-row .name{ font-weight:500; }
  .list-row .sub{ font-size:11.5px; color:var(--ink-soft); }
  .list-row .right{ display:flex; align-items:center; gap:10px; }
  .add-row{ display:flex; gap:8px; margin-top:12px; }
  .add-row input{ flex:1; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12.5px; color:var(--ink-soft); margin-bottom:6px; }
  .helptext{ font-size:12px; color:var(--ink-soft); margin-top:6px; line-height:1.7; }
  .iconbtn{
    background:var(--coral-bg);
    color:var(--coral-deep);
    border-radius:10px;
    padding:6px 10px;
    font-size:12px;
    font-weight:700;
  }
  /* ---- modal ---- */
  .modal-bg{
    position:fixed; inset:0; background:rgba(40,35,25,0.45);
    display:none; align-items:flex-end; justify-content:center; z-index:100;
  }
  .modal-bg.show{ display:flex; }
  .modal{
    background:var(--bg);
    width:100%; max-width:480px;
    border-radius:24px 24px 0 0;
    padding:22px 20px calc(24px + env(safe-area-inset-bottom));
    max-height:88vh;
    overflow-y:auto;
    animation:slideup .25s ease;
  }
  @keyframes slideup{ from{ transform:translateY(30px); opacity:0;} to{ transform:translateY(0); opacity:1;} }
  .modal h2{
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:18px;
    margin:0 0 4px;
  }
  .modal .sub{ font-size:12.5px; color:var(--ink-soft); margin-bottom:18px; }
  .chip-row{ display:flex; gap:8px; flex-wrap:wrap; margin:10px 0 4px; }
  .chip{
    background:var(--sage-bg); color:var(--sage-deep);
    border-radius:99px; padding:7px 13px; font-size:12.5px; font-weight:500;
  }
  .chip.active{ background:var(--sage); color:#fff; }
  .modal-actions{ display:flex; gap:10px; margin-top:18px; }
  .summary-box{
    background:var(--card); border-radius:16px; padding:14px 16px; margin:10px 0 16px;
    font-size:13px; line-height:2;
  }
  .summary-box .row{ display:flex; justify-content:space-between; }
  .summary-box .total{ border-top:1px solid var(--line); margin-top:6px; padding-top:8px; font-weight:700; font-family:'Zen Maru Gothic',sans-serif;}
  .toast{
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:10px 18px; border-radius:99px;
    font-size:13px; z-index:200; opacity:0; transition:opacity .2s, transform .2s;
    pointer-events:none;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(-6px); }
  .file-row{ display:flex; gap:10px; margin-top:10px; }
  .section-title{
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:13px; color:var(--ink-soft); margin:22px 4px 10px;
  }
</style>
</head>
<body>
<div class="app">

  <header class="top">
    <h1>ずぼら家計簿</h1>
    <p>都度メモらない、ゆるい家計管理</p>
  </header>

  <main>
    <!-- HOME -->
    <section id="pane-home" class="tabpane active"></section>

    <!-- SETTINGS -->
    <section id="pane-settings" class="tabpane"></section>

    <!-- HISTORY -->
    <section id="pane-history" class="tabpane"></section>
  </main>

  <nav class="tabs">
    <button data-tab="home" class="active"><span class="ic">🏠</span>ホーム</button>
    <button data-tab="settings"><span class="ic">⚙️</span>設定</button>
    <button data-tab="history"><span class="ic">📒</span>履歴</button>
  </nav>

  <div class="modal-bg" id="modalBg">
    <div class="modal" id="modalBody"></div>
  </div>

  <div class="toast" id="toast"></div>
</div>
